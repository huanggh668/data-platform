server:
  port: 8083

spring:
  application:
    name: encryption-service
  datasource:
    url: jdbc:dm://${DB_HOST:192.168.70.197}:${DB_PORT:5236}
    username: ${DB_USER:SYSDBA}
    password: ${DB_PASSWORD:SYSDBA}
    driver-class-name: dm.jdbc.driver.DmDriver
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:192.168.70.197:8848}
      config:
        enabled: true
        server-addr: ${NACOS_SERVER:192.168.70.197:8848}
        file-extension: yml
        import-check:
          enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.dataplatform.encryption.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      enabled: true