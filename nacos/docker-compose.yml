version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=192.168.70.197
      - MYSQL_SERVICE_PORT=45432
      - MYSQL_SERVICE_USER=toolbox
      - MYSQL_SERVICE_PASSWORD=vLkmcChDJpu0QM8sOKz8
      - MYSQL_SERVICE_DB_NAME=nacos
      - NACOS_AUTH_ENABLE=true
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./data:/home/nacos/data
      - ./logs:/home/nacos/logs
    restart: unless-stopped
    network_mode: host

  # Optional: MySQL for Nacos persistence
  mysql:
    image: mysql:8.0
    container_name: nacos-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=nacos_root_password
      - MYSQL_DATABASE=nacos
      - MYSQL_USER=toolbox
      - MYSQL_PASSWORD=vLkmcChDJpu0QM8sOKz8
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

volumes:
  mysql-data:
