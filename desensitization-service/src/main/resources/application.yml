server:
  port: 8081

spring:
  application:
    name: desensitization-service
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:192.168.70.197:8848}
      config:
        enabled: true
        server-addr: ${NACOS_SERVER:192.168.70.197:8848}
        file-extension: yaml
        import-check:
          enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
