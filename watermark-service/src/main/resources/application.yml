server:
  port: 8082

spring:
  application:
    name: watermark-service
  datasource:
    url: jdbc:dm://${DB_HOST:192.168.70.197}:${DB_PORT:5236}
    username: ${DB_USER:SYSDBA}
    password: ${DB_PASSWORD:SYSDBA}
    driver-class-name: dm.jdbc.driver.DmDriver
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:192.168.70.197:8848}
        namespace: ${NACOS_NAMESPACE:public}
      config:
        server-addr: ${NACOS_SERVER:192.168.70.197:8848}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
        refresh-enabled: true
        import-check:
          enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.dataplatform.watermark: DEBUG

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.dataplatform.watermark.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
