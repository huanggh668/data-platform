version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: data-platform-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-ui
      - user-service
      - desensitization-service
      - watermark-service
      - encryption-service
    networks:
      - dataplatform
    restart: unless-stopped

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    image: 192.168.70.197:5000/admin-ui:1.0.0
    container_name: admin-ui
    networks:
      - dataplatform
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=dm
      - MYSQL_SERVICE_HOST=192.168.70.197
      - MYSQL_SERVICE_PORT=5236
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=SYSDBA
      - MYSQL_SERVICE_PASSWORD=vLkmcChDJpu0QM8sOKz8
      - NACOS_AUTH_ENABLE=true
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs
    restart: unless-stopped
    networks:
      - dataplatform

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: 192.168.70.197:5000/user-service:1.0.0
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos
      - NACOS_PORT=8848
      - DB_HOST=192.168.70.197
      - DB_PORT=5236
      - DB_NAME=USER_SERVICE
      - DB_USER=SYSDBA
      - DB_PASSWORD=vLkmcChDJpu0QM8sOKz8
      - REDIS_HOST=192.168.70.197
      - REDIS_PORT=6379
    ports:
      - "8080:8080"
    depends_on:
      - nacos
    networks:
      - dataplatform
    restart: unless-stopped

  desensitization-service:
    build:
      context: ./desensitization-service
      dockerfile: Dockerfile
    image: 192.168.70.197:5000/desensitization-service:1.0.0
    container_name: desensitization-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos
      - NACOS_PORT=8848
      - NACOS_SERVER=nacos:8848
      - DB_HOST=192.168.70.197
      - DB_PORT=5236
      - DB_USER=SYSDBA
      - DB_PASSWORD=vLkmcChDJpu0QM8sOKz8
    ports:
      - "8081:8081"
    depends_on:
      - nacos
    networks:
      - dataplatform
    restart: unless-stopped

  watermark-service:
    build:
      context: ./watermark-service
      dockerfile: Dockerfile
    image: 192.168.70.197:5000/watermark-service:1.0.0
    container_name: watermark-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos
      - NACOS_PORT=8848
      - NACOS_SERVER=nacos:8848
      - DB_HOST=192.168.70.197
      - DB_PORT=5236
      - DB_USER=SYSDBA
      - DB_PASSWORD=vLkmcChDJpu0QM8sOKz8
    ports:
      - "8082:8082"
    depends_on:
      - nacos
    networks:
      - dataplatform
    restart: unless-stopped

  encryption-service:
    build:
      context: ./encryption-service
      dockerfile: Dockerfile
    image: 192.168.70.197:5000/encryption-service:1.0.0
    container_name: encryption-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos
      - NACOS_PORT=8848
      - NACOS_SERVER=nacos:8848
      - DB_HOST=192.168.70.197
      - DB_PORT=5236
      - DB_USER=SYSDBA
      - DB_PASSWORD=vLkmcChDJpu0QM8sOKz8
    ports:
      - "8083:8083"
    depends_on:
      - nacos
    networks:
      - dataplatform
    restart: unless-stopped

networks:
  dataplatform:
    driver: bridge
