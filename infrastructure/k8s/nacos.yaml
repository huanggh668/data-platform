apiVersion: v1
kind: Namespace
metadata:
  name: dataplatform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: dataplatform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.2.3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8848
          name: client
        - containerPort: 9848
          name: grpc
        env:
        - name: MODE
          value: standalone
        - name: JVM_XMS
          value: 256m
        - name: JVM_XMX
          value: 512m
        - name: JVM_XMN
          value: 128m
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 500m
        livenessProbe:
          httpGet:
            path: /nacos/
            port: 8848
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /nacos/
            port: 8848
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: dataplatform
spec:
  type: ClusterIP
  ports:
  - port: 8848
    targetPort: 8848
    name: client
  - port: 9848
    targetPort: 9848
    name: grpc
  selector:
    app: nacos
