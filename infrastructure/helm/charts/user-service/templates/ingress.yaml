apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-service
spec:
  ingressClassName: {{ .Values.ingress.className | default "traefik" }}
  rules:
    - host: {{ .Values.ingress.host | default "user-service.dataplatform.local" }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: {{ .Values.service.port | default 8080 }}
